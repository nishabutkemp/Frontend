services:
  frontend:
    build:
      context: .
    container_name: pulse-tickets-frontend
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://2.27.54.78:8000/v1}
      VITE_AUTH_LOGIN_PATH: ${VITE_AUTH_LOGIN_PATH:-/auth/login}
      VITE_USE_MOCKS: ${VITE_USE_MOCKS:-false}
      VITE_DEV_AUTH_TOKEN: ${VITE_DEV_AUTH_TOKEN:-}
      VITE_DEV_USER_ROLE: ${VITE_DEV_USER_ROLE:-employee}
    restart: unless-stopped
